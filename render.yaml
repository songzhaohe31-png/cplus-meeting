services:
  - type: web
    name: cplus-meeting
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ACCESS_PIN
        value: "2580"
      - key: DATA_DIR
        value: /data
    disk:
      name: cplus-data
      mountPath: /data
      sizeGB: 1
