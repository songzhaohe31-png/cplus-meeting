services:
  - type: web
    name: cplus-meeting
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATA_DIR
        value: /data
      # 默认不设访问码。需要时再加：ACCESS_PIN = 你的密码
    disk:
      name: cplus-data
      mountPath: /data
      sizeGB: 1
